- generic [ref=f2e2]: "{\"docs\":[{\"id\":42,\"slug\":\"zenithor-gel-cockroach-bait\",\"name\":\"Bả Diệt Gián Zenithor Gel Cockroach Bait\",\"category\":7,\"shortDescription\":\"Bả gel diệt gián chứa Indoxacarb của Ensystex.\",\"longDescription\":\"Zenithor Gel Cockroach Bait là sản phẩm bả gel chứa Indoxacarb, hướng tới kiểm soát gián ngay trong môi trường sống và nơi chúng trú ẩn. Nên đặt bả tại vị trí gián kiếm ăn, di chuyển hoặc ẩn náu theo hướng dẫn.\",\"heroImage\":131,\"galleryImages\":[132,131,130],\"specs\":[{\"id\":\"7303f0f4533b4fd3ae2abff0\",\"label\":\"Hoạt chất\",\"value\":\"Indoxacarb\"},{\"id\":\"88c59403ea9f4cd1bde59d57\",\"label\":\"Dạng\",\"value\":\"Bả gel\"},{\"id\":\"31205f365dce4ef497b75e95\",\"label\":\"Đối tượng xử lý\",\"value\":\"Gián\"},{\"id\":\"48dfbe7b1f484548af4a781f\",\"label\":\"Hãng sản xuất\",\"value\":\"Ensystex\"}],\"composition\":\"Indoxacarb.\",\"usage\":\"Chấm/đặt bả gel tại khu vực gián kiếm ăn, trú ẩn và đường đi; kiểm tra, thay mới theo hướng dẫn khi cần.\",\"warning\":\"Đặt bả ngoài tầm với của trẻ em và vật nuôi. Không để bả tiếp xúc thực phẩm; thu gom bao bì, bả thừa và xác côn trùng/chuột theo hướng dẫn.\",\"packaging\":\"Tuýp bả gel.\",\"certifications\":[],\"tags\":[{\"id\":\"7bfeb983c22c4308a51db963\",\"value\":\"Gián\"},{\"id\":\"51a3c0d69da04ce6bf7065ee\",\"value\":\"Bả gel\"},{\"id\":\"306c60b3a80c4596916dde4c\",\"value\":\"Indoxacarb\"},{\"id\":\"cba2d63dd17d4dcdbda26195\",\"value\":\"Ensystex\"}],\"updatedAt\":\"2026-07-04T17:01:32.159Z\",\"createdAt\":\"2026-07-04T08:27:49.426Z\"}],\"hasNextPage\":true,\"hasPrevPage\":false,\"limit\":1,\"nextPage\":2,\"page\":1,\"pagingCounter\":1,\"prevPage\":null,\"totalDocs\":47,\"totalPages\":47}"